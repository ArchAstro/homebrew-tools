name: Validate Tap

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate formula syntax
        run: ruby -c Formula/archastro.rb

      - name: Validate update script
        run: bash -n scripts/update-archastro-formula.sh
